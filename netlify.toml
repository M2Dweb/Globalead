[build]
  publish = "dist"    
  command = "npm run build"

[build.environment]
  NODE_VERSION = "20"   
  VITE_SUPABASE_URL = "$VITE_SUPABASE_URL"
  VITE_SUPABASE_ANON_KEY = "$VITE_SUPABASE_ANON_KEY"
  VITE_CLOUDFLARE_ACCOUNT_ID = "$VITE_CLOUDFLARE_ACCOUNT_ID"
  VITE_R2_ACCESS_KEY_ID = "$VITE_R2_ACCESS_KEY_ID"
  VITE_R2_SECRET_ACCESS_KEY = "$VITE_R2_SECRET_ACCESS_KEY"
  VITE_R2_BUCKET_NAME = "$VITE_R2_BUCKET_NAME"
  VITE_R2_PUBLIC_BASE_URL = "$VITE_R2_PUBLIC_BASE_URL"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[edge_functions]]
  function = "og-blog"
  path = "/blog/*"

# PREVINE O CACHE DO HTML (obrigando o browser a pedir sempre a versão mais recente)
[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# CACHE ETERNO PARA OS ASSETS (imagens, JS e CSS com hash do Vite)
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
